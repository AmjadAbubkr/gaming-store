name: Build Android APK
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          packager: npm
          expo-cache: false
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Setup Java for Local Android Build
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Check TypeScript types
        run: npx tsc --noEmit

      - name: Build Android APK (Free Local Build)
        if: github.event_name == 'push'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --local --non-interactive --output app.apk

      - name: Build Android AAB (Free Local Build)
        if: github.event_name == 'push'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --local --non-interactive --output app.aab

      - name: Upload Application Artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: gaming-store-android-builds
          path: |
            app.apk
            app.aab
          retention-days: 7
