name: Build Android Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: 18.4.0
          packager: npm
          expo-cache: false
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript types
        run: npx tsc --noEmit

      - name: Build Android AAB (Remote EAS Build)
        if: github.event_name == 'push'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile production --non-interactive --wait --json > build.json

      - name: Resolve AAB artifact URL
        if: github.event_name == 'push'
        run: |
          node -e "const fs=require('fs'); const raw=fs.readFileSync('build.json','utf8'); const data=JSON.parse(raw); const url=data?.artifacts?.buildUrl || data?.artifacts?.applicationArchiveUrl || data?.applicationArchiveUrl; if(!url){console.error(raw); process.exit(1);} fs.writeFileSync('build-url.txt', url);"

      - name: Download AAB artifact
        if: github.event_name == 'push'
        run: |
          curl -L "$(cat build-url.txt)" -o app.aab

      - name: Upload Application Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: gaming-store-android-aab
          path: app.aab
          retention-days: 7
