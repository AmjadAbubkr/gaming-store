name: Build Android APK
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          packager: npm
          expo-cache: false
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript types
        run: npx tsc --noEmit

      - name: Build Android APK on EAS
        if: github.event_name == 'push'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile preview --non-interactive --wait --json > eas-build.json

      - name: Download APK from EAS
        if: github.event_name == 'push'
        run: |
          ARTIFACT_URL=$(node -e "const fs=require('fs'); const raw=fs.readFileSync('eas-build.json','utf8').trim(); const parsed=JSON.parse(raw); const build=Array.isArray(parsed)?parsed[0]:parsed; const artifactUrl=build?.artifacts?.buildUrl; if(!artifactUrl){console.error('Missing build artifact URL in eas-build.json'); process.exit(1);} process.stdout.write(artifactUrl);")
          curl -L "$ARTIFACT_URL" -o app.apk

      - name: Upload APK Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: gaming-store-android-apk
          path: app.apk
          retention-days: 7
